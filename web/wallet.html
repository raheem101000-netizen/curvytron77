<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kurver Wallet</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Space Grotesk',sans-serif;background:#05050f;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:32px;width:100%;max-width:400px;}
h2{color:#fff;font-size:20px;margin-bottom:24px;letter-spacing:1px;}
input{width:100%;padding:10px 14px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#fff;font-size:14px;margin-bottom:12px;outline:none;}
input::placeholder{color:rgba(255,255,255,0.3);}
button{width:100%;padding:11px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:8px;}
.btn-check{background:#50c8ff;color:#020818;}
.btn-withdraw{background:#4CFF6C;color:#020818;display:none;}
.balance{font-size:32px;font-weight:700;color:#4CFF6C;text-align:center;margin:16px 0;}
.msg{font-size:13px;color:rgba(255,255,255,0.5);text-align:center;margin-top:8px;}
.back{display:block;text-align:center;margin-top:16px;color:rgba(255,255,255,0.3);font-size:12px;text-decoration:none;}
</style>
</head>
<body>
<div class="card">
  <h2>💰 Your Wallet</h2>
  <input id="email" type="email" placeholder="Enter your email">
  <button class="btn-check" onclick="checkBalance()">Check Balance</button>
  <div class="balance" id="balance" style="display:none"></div>
  <button class="btn-withdraw" id="withdraw-btn" onclick="withdraw()">Withdraw to my card</button>
  <div class="msg" id="msg"></div>
  <a href="/" class="back">← Back to Kurver</a>
</div>
<script>
const params = new URLSearchParams(window.location.search);
if(params.get('onboarded') === 'true'){
    document.getElementById('msg').textContent = '✅ Payout account set up! Your winnings will be sent automatically.';
    document.getElementById('msg').style.color = '#4CFF6C';
}
let userEmail = '';
async function checkBalance(){
  userEmail = document.getElementById('email').value.trim();
  if(!userEmail) return;
  const res = await fetch('/balance?email='+encodeURIComponent(userEmail));
  const data = await res.json();
  const bal = parseFloat(data.balance);
  document.getElementById('balance').style.display = 'block';
  document.getElementById('balance').textContent = '$'+bal.toFixed(2);
  if(bal > 0){
    document.getElementById('withdraw-btn').style.display = 'block';
  }
}
async function withdraw(){
  document.getElementById('msg').textContent = 'Processing...';
  const res = await fetch('/withdraw', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({email: userEmail})
  });
  const data = await res.json();
  if(data.success){
    document.getElementById('msg').textContent = '$'+data.amount.toFixed(2)+' sent to your card. Allow 3-5 business days.';
    document.getElementById('balance').textContent = '$0.00';
    document.getElementById('withdraw-btn').style.display = 'none';
  } else {
    document.getElementById('msg').textContent = data.error || 'Something went wrong';
  }
}
</script>
</body>
</html>
