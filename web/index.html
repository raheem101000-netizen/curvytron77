<!DOCTYPE html>
<!--[if lt IE 7]>      <html class="no-js lt-ie9 lt-ie8 lt-ie7"> <![endif]-->
<!--[if IE 7]>         <html class="no-js lt-ie9 lt-ie8"> <![endif]-->
<!--[if IE 8]>         <html class="no-js lt-ie9"> <![endif]-->
<!--[if gt IE 8]><!--> <html class="no-js"> <!--<![endif]-->
    <head>
        <title>Curvytron</title>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
        <meta name="format-detection" content="telephone=no">
        <meta name="keywords" content="Curvytron, Game, Curve, Multiplayer">
        <link rel="author" href="humans.txt" />
        <link rel="icon" type="image/png" href="images/favicon.png" />
        <link href='//fonts.googleapis.com/css?family=Lato:300,400,700' rel='stylesheet' type='text/css'>
        <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="css/style.css">
        <meta property="og:title" content="Curvytron - A multiplayer tron-like game... with curves!"/>
        <meta property="og:type" content="game"/>
        <meta property="og:url" content="http://www.curvytron.com"/>
        <meta property="og:site_name" content="Curvytron"/>
        <meta property="og:description" name="description" content="The ultimate addictive multiplayer game, come and play with friends or fellow workers !" />
        <meta property="og:locale" content="en" />
        <meta name="twitter:site" content="@Curvytron" />
        <link rel="alternate" href="http://www.curvytron.com" hreflang="en" />
        <!-- Google Analytics -->
    </head>
    <body ng-app="curvytronApp" ng-controller="CurvytronController">
        <div style="position:fixed;top:0;left:0;right:0;z-index:9999;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;background:rgba(5,5,15,0.85);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.07);">
          <a href="/" style="display:flex;align-items:center;gap:10px;text-decoration:none;">
            <svg width="28" height="28" viewBox="0 0 42 42" fill="none">
              <path d="M7 35 Q12 8 21 21 Q30 34 35 7" stroke="#50c8ff" stroke-width="3.5" stroke-linecap="round" fill="none"/>
              <path d="M5 24 Q13 3 22 16 Q31 29 37 12" stroke="#b450ff" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.7"/>
            </svg>
            <span style="font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;letter-spacing:3px;color:#fff;">KURVER</span>
          </a>
          <a href="/" style="font-family:'Space Grotesk',sans-serif;font-size:12px;color:rgba(255,255,255,0.4);text-decoration:none;letter-spacing:1px;">← Back to home</a>
        </div>
        <div style="height:56px;"></div>
        <!--[if lt IE 8]>
            <div id="browsehappy">
                <div id="browsehappy-inner">
                    Vous utilisez un navigateur internet trop vieux.<br/>Merci de le <a href="http://browsehappy.com/">mettre à jour</a> afin d'améliorer votre navigation.
                </div>
            </div>
        <![endif]-->
        <header>
            <a href="/#/" class="logo animated">
                <img src="images/logo.svg" alt="Curvytron" id="logo" />
                <span class="brand">curvytron</span>
            </a>
        </header>

        <div ng-controller="ProfileController" ng-if="profile">
            <ng-include src="'js/views/profile/link.html'"></ng-include>
            <div id="profile" class="panel" ng-include="'js/views/profile/profile.html'" onload="onLoaded()"></div>
        </div>

        <div id="connecting" ng-if="status === 'connecting'" class="container text-center">
            <h3>Connecting...</h3>
        </div>

        <div id="main" ng-if="status === 'online'" ng-view></div>

        <div id="error" ng-if="status === 'disconnected'" class="container text-center">
            <section class="centered">
                <h3>Something went wrong :(</h3>
                <p>You are not connected to the server.</p>
                <button ng-click="reload()" class="btn btn-default">
                    Try again now!
                </button>
            </section>
        </div>

        <footer>
            <div class="container">
                <div class="row">
                    <div class="col-lg-6 col-md-6 col-sm-6 col-xs-6 no-padding-bottom">
                        <a href="https://github.com/Elao/curvytron" target="_blank" class="ml10 animated"><i class="icon-github"></i></a>
                        <a href="http://twitter.com/curvytron" target="_blank" class="ml10 animated"><i class="icon-twitter"></i></a>
                        <a href="http://www.reddit.com/r/curvytron" target="_blank" class="ml10 animated"><i class="icon-reddit"></i></a>
                        <a href="/#/about" class="ml15 animated">About Us</a>
                    </div>
                    <div class="col-lg-6 col-md-6 col-sm-6 col-xs-6 no-padding-bottom text-right">
                        <a href="http://www.elao.com" class="game-copy animated" target="_blank">
                            Handmade at Elao with <i class="icon-love"></i>
                        </a>
                    </div>
                </div>
            </div>
        </footer>

        <script src="js/dependencies.js"></script>
        <script src="js/curvytron.js"></script>
    </body>
</html>
