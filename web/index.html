        <script>
/* Prize claim: intercept WebSocket to detect payout event from server */
(function(){
  var _Orig = window.WebSocket;
  window.WebSocket = function(url, protos) {
    var ws = protos ? new _Orig(url, protos) : new _Orig(url);
    ws.addEventListener('message', function(e) {
      try {
        var evts = JSON.parse(e.data);
        if (!Array.isArray(evts)) return;
        for (var i = 0; i < evts.length; i++) {
          if (Array.isArray(evts[i]) && evts[i][0] === 'payout') {
            var overlay = document.getElementById('kurver-prize-overlay');
            if (overlay) overlay.style.display = 'flex';
          }
        }
      } catch(err) {}
    });
    return ws;
  };
  Object.keys(_Orig).forEach(function(k){ window.WebSocket[k] = _Orig[k]; });
  window.WebSocket.prototype = _Orig.prototype;
})();

function _kurverSubmitClaim() {
  var name    = (document.getElementById('kp-name').value || '').trim();
  var paypal  = (document.getElementById('kp-paypal').value || '').trim();
  var contact = (document.getElementById('kp-contact').value || '').trim();
  var notes   = (document.getElementById('kp-notes').value || '').trim();
  var errEl   = document.getElementById('kp-error');
  errEl.style.display = 'none';
  if (!name) { errEl.style.display='block'; errEl.textContent='Please enter your full name'; return; }
  if (!paypal && !notes) { errEl.style.display='block'; errEl.textContent='Please enter your PayPal email or leave a note'; return; }
  var btn = document.getElementById('kp-submit');
  btn.textContent = 'SUBMITTING...'; btn.disabled = true;
  fetch('https://curvytron77.onrender.com/submit-prize-claim', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ winner_name: name, paypal_email: paypal, contact_email: contact, notes: notes, game: 'Kurver', prize_amount: '$8' })
  }).then(function(r){ return r.json(); }).then(function(d){
    if (d.success) {
      document.getElementById('kp-success').style.display = 'block';
      btn.style.display = 'none';
    } else { throw new Error('failed'); }
  }).catch(function(){
    btn.textContent = '► CLAIM MY PRIZE'; btn.disabled = false;
    errEl.style.display = 'block'; errEl.textContent = 'Something went wrong. Please try again.';
  });
}
document.addEventListener('DOMContentLoaded', function(){
  var btn = document.getElementById('kp-submit');
  if (btn) btn.onclick = _kurverSubmitClaim;
});
        </script>

        <script>
// Puz Royale mode — set flag and patch start to redirect all players
(function(){
    var params = new URLSearchParams(window.location.search);
    if(params.get('game') !== 'puz') return;
    window._launchPuzRoyale = true;

    // Banner
    var banner = document.createElement('div');
    banner.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;background:rgba(255,50,50,0.12);border-bottom:1px solid rgba(255,50,50,0.3);padding:10px 20px;text-align:center;font-family:Space Grotesk,sans-serif;font-size:13px;font-weight:600;color:#FF5555;letter-spacing:1px;';
    banner.textContent = '🎮 PUZ ROYALE — All players join, then host clicks Start to launch the battle';
    document.body.appendChild(banner);

    // Patch start — fires on ALL clients via room:game:start event, redirects everyone to Puz Royale
    var _origStart = RoomController.prototype.start;
    RoomController.prototype.start = function(e) {
        var roomName = this.room && this.room.name;
        if(roomName) {
            window.location.href = 'https://battle-royale-4ltk.onrender.com/play?mode=multiplayer&room=' + encodeURIComponent(roomName) + '&paid=true';
        } else {
            _origStart.call(this, e);
        }
    };
})();
(function(){
    var params = new URLSearchParams(window.location.search);
    if(params.get('paid') !== 'true') return;
    console.log('paid=true detected, waiting for Angular...');
    var attempts = 0;
    var interval = setInterval(function(){
        attempts++;
        console.log('attempt', attempts);
        try {
            var allScopes = document.querySelectorAll('[ng-controller]');
            console.log('ng-controller elements found:', allScopes.length);
            allScopes.forEach(function(el){
                var s = angular.element(el).scope();
                console.log('scope keys:', s ? Object.keys(s).filter(function(k){ return k[0] !== '$'; }) : 'null');
            });
            var scope = angular.element(document.querySelector('[ng-controller]')).scope();
            if(scope){
                console.log('has setReady:', !!scope.setReady);
                console.log('has players:', !!scope.players);
                if(scope.players) console.log('player items:', scope.players.items ? scope.players.items.length : 'no items');
            }
        } catch(e){ console.log('error:', e.message); }
        if(attempts > 20) clearInterval(interval);
    }, 500);
})();
        </script>
        <script>
var kurverRoomType = null;

function openKurverModal() {
    kurverRoomType = null;
    document.getElementById('modal-room-name').value = '';
    document.getElementById('modal-name-error').style.display = 'none';
    document.getElementById('modal-btn-public').style.cssText = 'flex:1;padding:9px;border-radius:8px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.5);cursor:pointer;font-family:Space Grotesk,sans-serif;font-size:12px;font-weight:600;';
    document.getElementById('modal-btn-private').style.cssText = 'flex:1;padding:9px;border-radius:8px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.5);cursor:pointer;font-family:Space Grotesk,sans-serif;font-size:12px;font-weight:600;';
    document.getElementById('kurver-modal-overlay').style.display = 'flex';
    setTimeout(function(){ document.getElementById('modal-room-name').focus(); }, 100);
}

function closeKurverModal() {
    document.getElementById('kurver-modal-overlay').style.display = 'none';
}

function kurverSetType(type) {
    kurverRoomType = type;
    var isPublic = type === 'public';
    document.getElementById('modal-btn-public').style.background = isPublic ? 'rgba(80,200,255,0.15)' : 'rgba(255,255,255,0.05)';
    document.getElementById('modal-btn-public').style.color = isPublic ? '#50c8ff' : 'rgba(255,255,255,0.5)';
    document.getElementById('modal-btn-public').style.borderColor = isPublic ? '#50c8ff' : 'rgba(255,255,255,0.15)';
    document.getElementById('modal-btn-private').style.background = !isPublic ? 'rgba(180,80,255,0.15)' : 'rgba(255,255,255,0.05)';
    document.getElementById('modal-btn-private').style.color = !isPublic ? '#b450ff' : 'rgba(255,255,255,0.5)';
    document.getElementById('modal-btn-private').style.borderColor = !isPublic ? '#b450ff' : 'rgba(255,255,255,0.15)';
    kurverCheckValid();
}

function kurverCheckValid() {
    var name = document.getElementById('modal-room-name').value.trim();
    var valid = name.length > 0 && kurverRoomType !== null;
    var btn = document.getElementById('modal-start-btn');
    btn.disabled = !valid;
    btn.style.opacity = valid ? '1' : '0.35';
    btn.style.cursor = valid ? 'pointer' : 'not-allowed';
}

function kurverSubmitRoom() {
    var name = document.getElementById('modal-room-name').value.trim();
    if (!name || !kurverRoomType) return;
    closeKurverModal();
    var scope = angular.element(document.getElementById('main')).scope();
    scope.$apply(function() {
        scope.roomName = name;
        scope.createRoom();
    });
}
