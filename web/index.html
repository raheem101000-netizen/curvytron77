        <style>
body { background: #05050f !important; font-family: 'Space Grotesk', sans-serif !important; }
.glow-bg { position: fixed; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 0; overflow: hidden; }
.glow-1 { position: absolute; width: 500px; height: 500px; background: #3b0fa0; border-radius: 50%; filter: blur(80px); top: -150px; left: -150px; opacity: 0.22; }
.glow-2 { position: absolute; width: 400px; height: 400px; background: #0f4fa0; border-radius: 50%; filter: blur(80px); top: 0; right: -100px; opacity: 0.18; }
.glow-3 { position: absolute; width: 450px; height: 450px; background: #a00f6e; border-radius: 50%; filter: blur(80px); bottom: 0; left: 50%; transform: translateX(-50%); opacity: 0.16; }
header { background: rgba(5,5,15,0.85) !important; backdrop-filter: blur(12px) !important; border-bottom: 1px solid rgba(255,255,255,0.07) !important; position: fixed !important; top: 0 !important; left: 0 !important; right: 0 !important; z-index: 9999 !important; padding: 12px 24px !important; display: flex !important; align-items: center !important; justify-content: space-between !important; }
header .logo { color: #fff !important; font-family: 'Space Grotesk', sans-serif !important; font-size: 20px !important; font-weight: 700 !important; letter-spacing: 3px !important; text-decoration: none !important; }
header .logo .brand { color: #fff !important; }
header img#logo { display: none !important; }
.container { position: relative; z-index: 1; }
h1, h2, h3, h4 { color: #fff !important; font-family: 'Space Grotesk', sans-serif !important; }
p, span, label, a { font-family: 'Space Grotesk', sans-serif !important; }
section.home { background: transparent !important; padding-top: 80px !important; }
section.home h1 { display: none !important; }
.rooms-list { background: rgba(255,255,255,0.03) !important; border: 1px solid rgba(255,255,255,0.08) !important; border-radius: 12px !important; }
.room-item { border-bottom: 1px solid rgba(255,255,255,0.06) !important; color: rgba(255,255,255,0.8) !important; }
.room-item:hover { background: rgba(255,255,255,0.05) !important; }
input[type=text] { background: rgba(255,255,255,0.05) !important; border: 1px solid rgba(255,255,255,0.12) !important; color: #fff !important; border-radius: 8px !important; font-family: 'Space Grotesk', sans-serif !important; }
input[type=text]::placeholder { color: rgba(255,255,255,0.3) !important; }
.btn, button { font-family: 'Space Grotesk', sans-serif !important; }
.btn-primary, .btn-default { background: #b450ff !important; border-color: #b450ff !important; color: #fff !important; border-radius: 8px !important; }
.btn-primary:hover, .btn-default:hover { opacity: 0.85 !important; }
footer { background: transparent !important; border-top: 1px solid rgba(255,255,255,0.06) !important; color: rgba(255,255,255,0.2) !important; }
footer a { color: rgba(255,255,255,0.3) !important; }
.back-home { color: rgba(255,255,255,0.4) !important; font-size: 12px !important; letter-spacing: 1px !important; text-decoration: none !important; }
/* Create Room button */
.btn-open-modal { padding: 9px 18px; background: #b450ff; color: #fff; border: none; border-radius: 8px; font-family: 'Space Grotesk', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
.btn-open-modal:hover { opacity: 0.85; }
/* Modal overlay */
.create-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.72); z-index: 99999; display: flex; align-items: center; justify-content: center; }
.create-modal { background: #0d0d1a; border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; padding: 32px; width: 340px; max-width: 92vw; }
.modal-title { color: #fff; font-family: 'Space Grotesk', sans-serif; font-size: 18px; font-weight: 700; margin-bottom: 22px; }
.modal-field { margin-bottom: 16px; }
.modal-input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12); color: #fff; border-radius: 8px; padding: 10px 14px; font-family: 'Space Grotesk', sans-serif; font-size: 14px; outline: none; }
.modal-input:focus { border-color: rgba(255,255,255,0.3); }
.modal-input::placeholder { color: rgba(255,255,255,0.3); }
/* Toggle */
.room-type-toggle { display: flex; gap: 8px; }
.toggle-btn { flex: 1; padding: 9px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.45); cursor: pointer; font-family: 'Space Grotesk', sans-serif; font-size: 13px; font-weight: 600; transition: all 0.15s; }
.toggle-btn.public-btn.active { background: rgba(80,200,255,0.15); border-color: #50c8ff; color: #50c8ff; }
.toggle-btn.private-btn.active { background: rgba(180,80,255,0.15); border-color: #b450ff; color: #b450ff; }
/* Modal actions */
.modal-actions { display: flex; gap: 10px; margin-top: 24px; }
.btn-start-room { flex: 1; padding: 11px 0; background: #b450ff; color: #fff; border: none; border-radius: 8px; font-family: 'Space Grotesk', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
.btn-start-room:hover { opacity: 0.85; }
.btn-start-room[disabled] { opacity: 0.35; cursor: not-allowed; }
.btn-start-room[disabled]:hover { opacity: 0.35; }
.btn-cancel-modal { padding: 11px 18px; background: transparent; color: rgba(255,255,255,0.45); border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; font-family: 'Space Grotesk', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
.btn-cancel-modal:hover { color: rgba(255,255,255,0.75); border-color: rgba(255,255,255,0.35); }
/* Validation states */
.room-name-error { color: #ff5555; font-size: 11px; margin-top: 5px; }
.input-error { border-color: #ff5555 !important; }
.toggle-error .toggle-btn { border-color: #ff5555 !important; color: #ff5555 !important; animation: flash-red 0.8s ease; }
@keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-6px)} 40%,80%{transform:translateX(6px)} }
@keyframes flash-red { 0%,100%{border-color:rgba(255,255,255,0.15)} 30%,70%{border-color:#ff5555} }
.shake { animation: shake 0.4s ease; }

/* Fix white on white text in room detail */
.room-detail input[type=text],
.player-name input,
.player input,
input.player-name,
td input[type=text],
.form-control {
    color: #fff !important;
    background: rgba(255,255,255,0.08) !important;
    border: 1px solid rgba(255,255,255,0.15) !important;
    border-radius: 6px !important;
}
.form-control::placeholder { color: rgba(255,255,255,0.4) !important; }

/* Fix password field */
.config input[type=text],
.password-field input,
input[ng-model="room.config.password"],
input[ng-model*="password"] {
    color: #fff !important;
    background: rgba(255,255,255,0.08) !important;
    border: 1px solid rgba(255,255,255,0.15) !important;
}

/* Fix color hex showing instead of swatch */
.color-picker input[type=text] {
    display: none !important;
}

/* Fix all table cells and labels in room detail */
.room-detail td, .room-detail th,
.room-detail label,
.room-detail p,
section.room td, section.room th,
section.room label {
    color: rgba(255,255,255,0.8) !important;
}

/* Fix light background rows */
.room-detail tr, section.room tr {
    background: transparent !important;
}
.room-detail tr:hover, section.room tr:hover {
    background: rgba(255,255,255,0.04) !important;
}

        <script>
var kurverRoomType = null;

function openKurverModal() {
    kurverRoomType = null;
    document.getElementById('modal-room-name').value = '';
    document.getElementById('modal-name-error').style.display = 'none';
    document.getElementById('modal-btn-public').style.cssText = 'flex:1;padding:9px;border-radius:8px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.5);cursor:pointer;font-family:Space Grotesk,sans-serif;font-size:12px;font-weight:600;';
    document.getElementById('modal-btn-private').style.cssText = 'flex:1;padding:9px;border-radius:8px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.5);cursor:pointer;font-family:Space Grotesk,sans-serif;font-size:12px;font-weight:600;';
    document.getElementById('kurver-modal-overlay').style.display = 'flex';
    setTimeout(function(){ document.getElementById('modal-room-name').focus(); }, 100);
}

function closeKurverModal() {
    document.getElementById('kurver-modal-overlay').style.display = 'none';
}

function kurverSetType(type) {
    kurverRoomType = type;
    var isPublic = type === 'public';
    document.getElementById('modal-btn-public').style.background = isPublic ? 'rgba(80,200,255,0.15)' : 'rgba(255,255,255,0.05)';
    document.getElementById('modal-btn-public').style.color = isPublic ? '#50c8ff' : 'rgba(255,255,255,0.5)';
    document.getElementById('modal-btn-public').style.borderColor = isPublic ? '#50c8ff' : 'rgba(255,255,255,0.15)';
    document.getElementById('modal-btn-private').style.background = !isPublic ? 'rgba(180,80,255,0.15)' : 'rgba(255,255,255,0.05)';
    document.getElementById('modal-btn-private').style.color = !isPublic ? '#b450ff' : 'rgba(255,255,255,0.5)';
    document.getElementById('modal-btn-private').style.borderColor = !isPublic ? '#b450ff' : 'rgba(255,255,255,0.15)';
    kurverCheckValid();
}

function kurverCheckValid() {
    var name = document.getElementById('modal-room-name').value.trim();
    var valid = name.length > 0 && kurverRoomType !== null;
    var btn = document.getElementById('modal-start-btn');
    btn.disabled = !valid;
    btn.style.opacity = valid ? '1' : '0.35';
    btn.style.cursor = valid ? 'pointer' : 'not-allowed';
}

function kurverSubmitRoom() {
    var name = document.getElementById('modal-room-name').value.trim();
    if (!name || !kurverRoomType) return;
    closeKurverModal();
    var scope = angular.element(document.getElementById('main')).scope();
    scope.$apply(function() {
        scope.roomName = name;
        scope.createRoom();
    });
}
        </script>
